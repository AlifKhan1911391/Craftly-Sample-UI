<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Craftly Internet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .auth-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-card { width: 100%; max-width: 400px; background: #fff; border: 1px solid var(--border-color); border-radius: 16px; padding: 40px; text-align: center; }
        .auth-logo { font-family: var(--font-logo); font-size: 32px; margin-bottom: 10px; }
        .auth-subtitle { color: var(--secondary-text); margin-bottom: 30px; font-size: 14px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .input-wrap { position: relative; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-main); font-size: 14px; }
        .form-control:focus { outline: none; border-color: #000; }
        .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999; font-size: 14px; }
        .auth-btn { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; }
        .auth-footer { margin-top: 25px; font-size: 14px; color: var(--secondary-text); }
        .auth-footer a { color: #000; font-weight: 700; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">Craftly</div>
            <p class="auth-subtitle">Welcome back to the developer internet.</p>

            <div>
                <div class="form-group">
                    <label for="loginEmail">Email or Username</label>
                    <input type="text" id="loginEmail" class="form-control" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="loginPassword" class="form-control" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
                        <button class="toggle-pw" type="button" onclick="togglePw('loginPassword', this)" aria-label="Show password">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" style="font-size: 12px; color: var(--secondary-text);">Forgot password?</a>
                </div>
                <a href="index.html" class="btn btn-dark auth-btn" style="display: block; text-align: center;">Login</a>
            </div>

            <div style="margin: 25px 0; display: flex; align-items: center; gap: 10px;">
                <div style="flex-grow: 1; height: 1px; background: #eee;"></div>
                <span style="font-size: 12px; color: #999;">OR</span>
                <div style="flex-grow: 1; height: 1px; background: #eee;"></div>
            </div>

            <button class="btn btn-outline auth-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;">
                <i class="fa-brands fa-google"></i> Continue with Google
            </button>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </div>
    <script>
    function togglePw(fieldId, btn) {
        var field = document.getElementById(fieldId);
        var icon = btn.querySelector('i');
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
    </script>
</body>
</html>
