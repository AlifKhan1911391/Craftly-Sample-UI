<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Craftly | Craftly Internet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .auth-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        .auth-logo {
            font-family: var(--font-logo);
            font-size: 32px;
            margin-bottom: 10px;
        }
        .auth-subtitle {
            color: var(--secondary-text);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #000;
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }
        .auth-footer {
            margin-top: 25px;
            font-size: 14px;
            color: var(--secondary-text);
        }
        .auth-footer a {
            color: #000;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">Craftly</div>
            <p class="auth-subtitle">Join the 76-day mission to build Bangladesh's AI.</p>
            
            <form>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" class="form-control" placeholder="Mahadi">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" class="form-control" placeholder="Alif">
                    </div>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" placeholder="alif_engineer">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="alif@craftly.me">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
                <p style="font-size: 11px; color: #999; margin-bottom: 20px; text-align: left;">
                    By signing up, you agree to join the collective effort to train Craftly Robot.
                </p>
                <a href="index.html" class="btn btn-dark auth-btn" style="display: block; text-align: center;">Create Account</a>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
</body>
</html>
